<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>돈벼락 💰</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../assets/images/50000.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── 세로 모드 경고 ── -->
  <div id="portrait-warning">
    <div class="pw-icon">📱</div>
    <div class="pw-text">화면을 가로로 돌려주세요!</div>
    <div class="pw-sub">Turn to Landscape 🔄</div>
  </div>

  <!-- ── 시작 화면 ── -->
  <div id="screen-start" class="screen">
    <div class="title-wrap">
      <div class="title-main">돈벼락</div>
      <div class="title-sub">MONEY STORM</div>
    </div>
    <div class="how-to">
      <div style="font-size:14px; color:#fff; line-height:1.7; text-align:center;">
        날아다니는 지폐와 동전을<br><strong style="color:#FFD700;">손가락으로 콕콕콕</strong> 찌르세요!
      </div>
      <div style="margin-top:8px; font-size:11px; color:#888; text-align:center;">
        ⏱ 60초 안에 최대한 많이!
      </div>
    </div>
    <button id="btn-start" class="btn-start">게임 시작 🎮</button>
    <div id="install-hint" class="install-hint"></div>
  </div>

  <!-- ── 이름 입력 화면 ── -->
  <div id="screen-name" class="screen">
    <div class="name-title">💰 참가자 이름을 입력하세요</div>
    <div class="name-sub">랭킹에 표시될 이름이에요</div>
    <input type="text" id="player-name-input" class="name-input"
      placeholder="이름 또는 별명" maxlength="10" autocomplete="off">
    <div class="name-btns">
      <button id="btn-name-skip" class="btn-skip">건너뛰기</button>
      <button id="btn-name-confirm" class="btn-confirm">확인 ✓</button>
    </div>
  </div>

  <!-- ── 카운트다운 화면 ── -->
  <div id="screen-countdown" class="screen">
    <div id="countdown-number">3</div>
    <div id="countdown-text">준비하세요!</div>
  </div>

  <!-- ── 게임 화면 ── -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>

    <!-- 타이머 HUD -->
    <div id="hud">
      <div id="timer-box">
        <div id="timer-label">TIME</div>
        <div id="timer-value">60</div>
      </div>
    </div>

    <!-- 난이도 뱃지 -->
    <div id="difficulty-badge">⚡ 보통</div>

    <!-- 실시간 랭킹 패널 (좌하단) -->
    <div id="live-ranking">
      <div class="lr-title">🏆 실시간 랭킹</div>
      <div id="lr-list"></div>
    </div>

    <!-- 마을통장 패널 -->
    <div id="bank-panel">
      <div class="bb-card">
        <div class="bb-nh-cover">
          <div class="bb-nh-lines"><div></div><div></div><div></div></div>
          <div class="bb-nh-title">마을통장</div>
          <div class="bb-nh-bottom">
            <div class="bb-nh-brand">
              <span class="bb-nh-icon">⊛</span>
              <span class="bb-nh-name">마을은행</span>
            </div>
            <div class="bb-nh-stamp">검인</div>
          </div>
        </div>
        <div class="bb-card-body">
          <div class="bb-acct-label">잔 &nbsp;액</div>
          <div id="bank-total" class="bb-card-amount">₩0</div>
        </div>
        <div class="bb-card-footer">
          <span>실시간 잔액</span><span>60초 승부</span>
        </div>
      </div>

      <div class="bank-divider"></div>
      <div class="bank-row" id="bank-50000"><span class="denom" style="color:#EDD890">오만원</span><span class="count" id="count-50000">× 0</span><span class="amount" id="amt-50000"></span></div>
      <div class="bank-row" id="bank-10000"><span class="denom" style="color:#96C8A0">만원</span><span class="count" id="count-10000">× 0</span><span class="amount" id="amt-10000"></span></div>
      <div class="bank-row" id="bank-5000"><span class="denom" style="color:#D4B898">오천원</span><span class="count" id="count-5000">× 0</span><span class="amount" id="amt-5000"></span></div>
      <div class="bank-row" id="bank-1000"><span class="denom" style="color:#90B8D8">천원</span><span class="count" id="count-1000">× 0</span><span class="amount" id="amt-1000"></span></div>
      <div class="bank-divider"></div>
      <div class="bank-row" id="bank-500"><span class="denom" style="color:#C8C8A0">오백원</span><span class="count" id="count-500">× 0</span><span class="amount" id="amt-500"></span></div>
      <div class="bank-row" id="bank-100"><span class="denom" style="color:#B0B0B0">백원</span><span class="count" id="count-100">× 0</span><span class="amount" id="amt-100"></span></div>

      <div class="bank-divider" style="margin-top:auto"></div>
      <div id="mission-text" class="mission-box">💰 돈을 잡아라!</div>
    </div>
  </div>

  <!-- ── 게임오버 화면 ── -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-title">⏰ 시간 종료!</div>
    <div class="gameover-score-box">
      <div class="gameover-score-label">마을통장 최종 잔액</div>
      <div id="gameover-score-value" class="gameover-score-value">₩0</div>
    </div>
    <div class="ranking-box">
      <h3>🏆 참가자 랭킹</h3>
      <div id="ranking-list"></div>
    </div>
    <button id="btn-retry" class="btn-retry">다시 하기 🔄</button>
  </div>

  <!-- JS (순서 중요) -->
  <script>window.BGM_BASE = '../';</script>
  <script src="../js/score.js"></script>
  <script src="../js/sound.js"></script>
  <script src="../js/money.js"></script>
  <script src="js/game-mobile.js"></script>
  <script src="js/main-mobile.js"></script>
</body>
</html>
