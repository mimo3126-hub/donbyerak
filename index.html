<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>돈벼락 💰</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1a0a 0%, #0a0a2a 50%, #1a0a0a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Jua', 'Malgun Gothic', sans-serif;
      gap: 32px;
      padding: 24px;
      overflow: hidden;
    }

    /* 배경 반짝이 파티클 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,215,0,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,100,0,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .title-wrap { text-align: center; }

    .title-main {
      font-size: clamp(64px, 12vw, 100px);
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      line-height: 1;
      animation: shimmer 2.5s infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.35); }
    }

    .title-sub {
      font-size: clamp(13px, 2.5vw, 18px);
      color: #888;
      margin-top: 6px;
      letter-spacing: 5px;
    }

    .rain { font-size: clamp(28px, 5vw, 44px); letter-spacing: 8px; animation: fall 1.6s infinite ease-in-out alternate; }
    @keyframes fall {
      0%   { transform: translateY(-6px); opacity: 0.6; }
      100% { transform: translateY(6px);  opacity: 1; }
    }

    .desc {
      font-size: clamp(13px, 2.5vw, 16px);
      color: #aaa;
      text-align: center;
      line-height: 1.8;
      font-family: 'Gaegu', sans-serif;
    }
    .desc strong { color: #FFD700; }

    /* ── 버전 선택 카드 ── */
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,215,0,0.25);
      border-radius: 24px;
      padding: 32px 36px;
      width: clamp(200px, 36vw, 280px);
      text-decoration: none;
      color: #fff;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: #FFD700;
      box-shadow: 0 12px 40px rgba(255,215,0,0.25);
    }
    .card:active { transform: scale(0.97); }

    .card-icon { font-size: clamp(44px, 8vw, 64px); }

    .card-title {
      font-size: clamp(18px, 3.5vw, 24px);
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 1px;
    }

    .card-tags {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .tag {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #aaa;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 12px;
      font-family: 'Gaegu', sans-serif;
      letter-spacing: 0.5px;
    }

    .card-btn {
      margin-top: 6px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a00;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 900;
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-family: 'Jua', sans-serif;
      letter-spacing: 2px;
      pointer-events: none;
    }

    .footer {
      font-size: 11px;
      color: #444;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="title-wrap">
    <div class="title-main">돈벼락</div>
    <div class="title-sub">MONEY STORM</div>
  </div>

  <div class="rain">💴 💵 💶 💷</div>

  <div class="desc">
    날아다니는 지폐와 동전을<br>
    <strong>손가락으로 콕콕콕</strong> 잡아라! ⏱ 60초 승부
  </div>

  <div class="cards">

    <a class="card" href="pc/">
      <div class="card-icon">💻</div>
      <div class="card-title">PC로 하기</div>
      <div class="card-tags">
        <span class="tag">🎥 웹캠으로 손 인식</span>
        <span class="tag">☝️ 손가락 움직임으로 조작</span>
        <span class="tag">🌐 Chrome 브라우저 필수</span>
      </div>
      <div class="card-btn">시작하기 →</div>
    </a>

    <a class="card" href="mobile/">
      <div class="card-icon">📱</div>
      <div class="card-title">핸드폰으로 하기</div>
      <div class="card-tags">
        <span class="tag">👆 화면을 직접 터치</span>
        <span class="tag">📐 가로 모드 권장</span>
        <span class="tag">✅ 모든 브라우저 지원</span>
      </div>
      <div class="card-btn">시작하기 →</div>
    </a>

  </div>

  <div class="footer">
    💡 핸드폰은 Safari/Chrome 공유 버튼 → <strong style="color:#666;">홈 화면에 추가</strong>하면 앱처럼 전체화면으로 즐길 수 있어요
  </div>

</body>
</html>
