<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>돈벼락 💰</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100svh;
      background: linear-gradient(135deg, #0a1a0a 0%, #0a0a2a 50%, #1a0a0a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Jua', 'Malgun Gothic', sans-serif;
      gap: clamp(10px, 2.5vh, 28px);
      padding: clamp(12px, 3vw, 24px);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,215,0,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,100,0,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── 타이틀 ── */
    .title-main {
      font-size: clamp(36px, 9vw, 96px);
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1;
      animation: shimmer 2.5s infinite;
      text-align: center;
    }
    .title-sub {
      font-size: clamp(10px, 2vw, 16px);
      color: #777;
      letter-spacing: 4px;
      text-align: center;
      margin-top: 4px;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.35); }
    }

    .desc {
      font-size: clamp(11px, 2.2vw, 15px);
      color: #aaa;
      text-align: center;
      line-height: 1.7;
      font-family: 'Gaegu', sans-serif;
    }
    .desc strong { color: #FFD700; }

    /* ── 카드 컨테이너: 항상 가로 2열 ── */
    .cards {
      display: flex;
      gap: clamp(10px, 2.5vw, 20px);
      flex-wrap: nowrap;        /* ← 절대 줄바꿈 안 함 */
      width: 100%;
      max-width: 580px;
    }

    .card {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1.5vh, 12px);
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,215,0,0.25);
      border-radius: 20px;
      padding: clamp(14px, 3vh, 28px) clamp(10px, 2.5vw, 24px);
      text-decoration: none;
      color: #fff;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: #FFD700;
      box-shadow: 0 10px 32px rgba(255,215,0,0.22);
    }
    .card:active { transform: scale(0.97); }

    .card-icon { font-size: clamp(28px, 6vw, 56px); }

    .card-title {
      font-size: clamp(14px, 3.2vw, 22px);
      font-weight: 900;
      color: #FFD700;
      text-align: center;
    }

    .card-tags {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .tag {
      font-size: clamp(9px, 1.6vw, 12px);
      color: #aaa;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: 'Gaegu', sans-serif;
      text-align: center;
      width: 100%;
    }

    .card-btn {
      margin-top: 4px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a00;
      font-size: clamp(12px, 2.2vw, 15px);
      font-weight: 900;
      border: none;
      border-radius: 50px;
      padding: clamp(7px, 1.5vh, 11px) clamp(16px, 3vw, 26px);
      font-family: 'Jua', sans-serif;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
    }

    .footer {
      font-size: clamp(9px, 1.6vw, 11px);
      color: #444;
      text-align: center;
      line-height: 1.6;
    }
    .footer strong { color: #555; }
  </style>
</head>
<body>

  <div>
    <div class="title-main">돈벼락</div>
    <div class="title-sub">MONEY STORM</div>
  </div>

  <div class="desc">
    날아다니는 지폐와 동전을<br>
    <strong>손가락으로 콕콕콕</strong> 잡아라! ⏱ 60초 승부
  </div>

  <div class="cards">

    <a class="card" href="pc/">
      <div class="card-icon">💻</div>
      <div class="card-title">PC로 하기</div>
      <div class="card-tags">
        <span class="tag">🎥 웹캠 손 인식</span>
        <span class="tag">☝️ 손가락 조작</span>
        <span class="tag">🌐 Chrome 필수</span>
      </div>
      <div class="card-btn">시작하기 →</div>
    </a>

    <a class="card" href="mobile/">
      <div class="card-icon">📱</div>
      <div class="card-title">핸드폰으로 하기</div>
      <div class="card-tags">
        <span class="tag">👆 화면 터치 조작</span>
        <span class="tag">📐 가로 모드 권장</span>
        <span class="tag">✅ 모든 브라우저</span>
      </div>
      <div class="card-btn">시작하기 →</div>
    </a>

  </div>

  <div class="footer">
    💡 핸드폰은 공유 버튼 → <strong>홈 화면에 추가</strong>하면 앱처럼 전체화면으로!
  </div>

</body>
</html>
