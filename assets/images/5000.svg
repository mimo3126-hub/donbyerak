<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220">
  <defs>
    <clipPath id="bc5k"><rect width="440" height="220" rx="10"/></clipPath>
    <radialGradient id="portraitBg5k" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#D4B898"/>
      <stop offset="100%" stop-color="#A8845C"/>
    </radialGradient>
  </defs>

  <!-- Main background -->
  <rect width="440" height="220" rx="10" fill="#D4B898"/>

  <!-- Building scene (center) -->
  <!-- Main building (Ojukheon) -->
  <rect clip-path="url(#bc5k)" x="90" y="115" width="90" height="60" fill="#C8A070"/>
  <rect clip-path="url(#bc5k)" x="85" y="108" width="100" height="12" fill="#8B5C30"/>
  <polygon clip-path="url(#bc5k)" points="85,108 135,82 185,108" fill="#8B5C30"/>
  <polygon clip-path="url(#bc5k)" points="88,108 135,86 182,108" fill="#A06838"/>
  <!-- Roof ridge -->
  <rect clip-path="url(#bc5k)" x="100" y="103" width="70" height="7" rx="2" fill="#6B3A18"/>
  <!-- Windows -->
  <rect clip-path="url(#bc5k)" x="102" y="125" width="18" height="22" fill="#8B6840"/>
  <rect clip-path="url(#bc5k)" x="126" y="125" width="18" height="22" fill="#8B6840"/>
  <rect clip-path="url(#bc5k)" x="150" y="125" width="18" height="22" fill="#8B6840"/>
  <!-- Foundation -->
  <rect clip-path="url(#bc5k)" x="82" y="172" width="106" height="8" rx="2" fill="#6B3A18"/>
  <!-- Steps -->
  <rect clip-path="url(#bc5k)" x="90" y="175" width="90" height="6" fill="#A07850"/>
  <rect clip-path="url(#bc5k)" x="95" y="180" width="80" height="6" fill="#906840"/>
  <!-- Ground -->
  <rect clip-path="url(#bc5k)" x="82" y="185" width="106" height="35" fill="#B89060"/>

  <!-- Bamboo stalks (left of building) -->
  <rect clip-path="url(#bc5k)" x="78" y="70" width="6" height="120" fill="#5A8040"/>
  <rect clip-path="url(#bc5k)" x="88" y="80" width="5" height="110" fill="#4A7030"/>
  <rect clip-path="url(#bc5k)" x="75" y="68" width="4" height="125" fill="#4A7030"/>
  <!-- Bamboo nodes -->
  <rect clip-path="url(#bc5k)" x="77" y="95" width="7" height="3" fill="#3A5820"/>
  <rect clip-path="url(#bc5k)" x="77" y="120" width="7" height="3" fill="#3A5820"/>
  <rect clip-path="url(#bc5k)" x="77" y="145" width="7" height="3" fill="#3A5820"/>
  <!-- Bamboo leaves -->
  <path clip-path="url(#bc5k)" d="M 84 78 Q 100 65 115 72" stroke="#3A5820" stroke-width="3" fill="none"/>
  <path clip-path="url(#bc5k)" d="M 82 92 Q 72 78 60 80" stroke="#3A5820" stroke-width="3" fill="none"/>
  <!-- Moon (top right of scene) -->
  <circle clip-path="url(#bc5k)" cx="240" cy="55" r="18" fill="#F5E8D0" opacity="0.7"/>
  <circle clip-path="url(#bc5k)" cx="248" cy="52" r="14" fill="#D4B898"/>

  <!-- Left dark strip -->
  <rect clip-path="url(#bc5k)" x="0" y="0" width="68" height="220" fill="#8B5C30"/>
  <rect clip-path="url(#bc5k)" x="68" y="0" width="4" height="220" fill="#6B3A18"/>

  <!-- Vertical "5000" on left -->
  <text clip-path="url(#bc5k)" transform="translate(38,195) rotate(-90)" font-size="13" fill="white" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="3">5000</text>
  <text clip-path="url(#bc5k)" transform="translate(18,130) rotate(-90)" font-size="10" fill="rgba(255,255,255,0.6)" font-family="Arial">• • •</text>

  <!-- Portrait area background -->
  <rect clip-path="url(#bc5k)" x="283" y="0" width="157" height="220" fill="url(#portraitBg5k)"/>
  <rect clip-path="url(#bc5k)" x="283" y="0" width="4" height="220" fill="#6B3A18"/>

  <!-- Yi I (율곡 이이) portrait -->
  <!-- Body/robe (white) -->
  <path clip-path="url(#bc5k)" d="M 295 220 L 295 158 Q 360 142 425 158 L 425 220 Z" fill="#D4C0A0"/>
  <!-- Collar -->
  <path clip-path="url(#bc5k)" d="M 335 160 Q 360 152 385 160" stroke="#B09070" stroke-width="3" fill="none"/>
  <!-- Neck -->
  <rect clip-path="url(#bc5k)" x="348" y="140" width="24" height="22" rx="5" fill="#C4987A"/>
  <!-- Head -->
  <ellipse clip-path="url(#bc5k)" cx="360" cy="108" rx="41" ry="45" fill="#C4987A"/>
  <!-- Black hat (사모) -->
  <ellipse clip-path="url(#bc5k)" cx="360" cy="66" rx="45" ry="12" fill="#1A1410"/>
  <rect clip-path="url(#bc5k)" x="326" y="52" width="68" height="18" rx="3" fill="#201810"/>
  <rect clip-path="url(#bc5k)" x="338" y="40" width="44" height="16" rx="3" fill="#1A1410"/>
  <ellipse clip-path="url(#bc5k)" cx="360" cy="40" rx="22" ry="8" fill="#1A1410"/>
  <!-- Hat side wings -->
  <path clip-path="url(#bc5k)" d="M 315 64 Q 305 70 308 80 Q 318 75 326 66 Z" fill="#1A1410"/>
  <path clip-path="url(#bc5k)" d="M 405 64 Q 415 70 412 80 Q 402 75 394 66 Z" fill="#1A1410"/>
  <!-- Facial features -->
  <ellipse cx="348" cy="100" rx="6" ry="4" fill="#7A5838"/>
  <ellipse cx="372" cy="100" rx="6" ry="4" fill="#7A5838"/>
  <path d="M 342 93 Q 348 90 354 92" stroke="#5A3818" stroke-width="1.5" fill="none"/>
  <path d="M 366 93 Q 372 90 378 92" stroke="#5A3818" stroke-width="1.5" fill="none"/>
  <ellipse cx="360" cy="112" rx="4" ry="5" fill="#B88060"/>
  <path d="M 352 122 Q 360 128 368 122" stroke="#7A5030" stroke-width="2" fill="none"/>
  <!-- Beard (short) -->
  <path clip-path="url(#bc5k)" d="M 342 128 Q 345 142 360 148 Q 375 142 378 128 Q 368 136 360 138 Q 352 136 342 128 Z" fill="#7A5030"/>

  <!-- Bank name -->
  <rect clip-path="url(#bc5k)" x="90" y="10" width="185" height="35" rx="5" fill="#E0C8A0" opacity="0.5"/>
  <text x="182" y="33" text-anchor="middle" font-size="17" fill="#5C3010" font-family="'Malgun Gothic', serif" font-weight="bold">한국은행</text>

  <!-- Hologram circle -->
  <circle cx="115" cy="80" r="22" fill="rgba(255,255,255,0.3)" stroke="#6B3A18" stroke-width="2"/>
  <circle cx="115" cy="80" r="15" fill="none" stroke="#6B3A18" stroke-width="1.5"/>
  <text x="115" y="84" text-anchor="middle" font-size="11" fill="#5C3010" font-family="serif">◎</text>

  <!-- 오천원 text -->
  <text x="188" y="83" text-anchor="middle" font-size="28" fill="#5C3010" font-family="'Malgun Gothic', serif" font-weight="bold">오천원</text>

  <!-- Large 5000 number -->
  <text x="82" y="208" font-size="38" fill="#5C3010" font-family="Arial, sans-serif" font-weight="bold">5000</text>

  <!-- Right strip -->
  <rect clip-path="url(#bc5k)" x="420" y="0" width="20" height="220" fill="#6B3A18"/>
  <text clip-path="url(#bc5k)" transform="translate(430,195) rotate(-90)" font-size="11" fill="#D4B898" font-family="Arial">5000</text>

  <!-- Border -->
  <rect width="440" height="220" rx="10" fill="none" stroke="#5C3010" stroke-width="3"/>
</svg>
